<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ThiTHPT Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header style="background: #0f172a;">
        <div class="header-container" style="color: white;">
            <h2><i class="fa-solid fa-user-shield"></i> Trang Quản Trị Viên</h2>
            <a href="index.html" class="btn btn-outline" style="color: white; border-color: white;">Về Trang Chủ</a>
        </div>
    </header>

    <div class="dashboard-container fade-in">
        <div class="stat-grid" style="margin-bottom: 30px;">
            <div class="stat-box">
                <h3 style="color: var(--text-light);">Tổng Sinh Viên</h3>
                <h1 style="color: var(--primary); font-size: 3rem;" id="ad-total-users">0</h1>
            </div>
            <div class="stat-box">
                <h3 style="color: var(--text-light);">Lượt Làm Bài</h3>
                <h1 style="color: var(--success); font-size: 3rem;" id="ad-total-exams">0</h1>
            </div>
        </div>

        <h2 class="subject-title">Danh sách thí sinh</h2>
        <div class="data-table-container">
            <table class="data-table" id="admin-user-table">
                <thead><tr><th>ID</th><th>Họ Tên</th><th>Email</th><th>Vai Trò</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <h2 class="subject-title" style="margin-top: 40px;">Sao Lưu & Phục Hồi Dữ Liệu</h2>
        <div class="data-table-container">
            <p><strong>Dữ liệu JSON thô (Dùng để copy lưu trữ vào máy tính):</strong></p>
            <textarea id="db-dump" style="width: 100%; height: 150px; font-family: monospace; padding: 10px; border-radius: 8px; border: 1px solid var(--border);"></textarea>
            
            <p style="margin-top: 20px;"><strong>Dán JSON vào đây và ấn nút để Khôi Phục (Ghi đè Server):</strong></p>
            <textarea id="db-restore" style="width: 100%; height: 150px; font-family: monospace; padding: 10px; border-radius: 8px; border: 1px solid var(--danger);"></textarea>
            <button class="btn btn-danger" style="margin-top: 10px; background: var(--danger); color: white;" onclick="forceRestore()">⚠ Bắt Buộc Khôi Phục Dữ Liệu</button>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        window.onload = async () => {
            await loadGitlabData();
        }

        function renderAdmin() {
            document.getElementById('ad-total-users').innerText = DATA.users ? DATA.users.length : 0;
            document.getElementById('ad-total-exams').innerText = DATA.results ? DATA.results.length : 0;

            let userBody = document.querySelector('#admin-user-table tbody');
            userBody.innerHTML = '';
            if(DATA.users) {
                DATA.users.forEach(u => {
                    userBody.innerHTML += `<tr><td>${u.id}</td><td>${u.name}</td><td>${u.email}</td><td>${u.role}</td></tr>`;
                });
            }

            document.getElementById('db-dump').value = JSON.stringify(DATA, null, 2);
        }

        async function forceRestore() {
            let confirmMsg = prompt("CẢNH BÁO: Thao tác này sẽ xóa sạch dữ liệu hiện tại trên GitLab và thay bằng dữ liệu bạn vừa dán. Gõ 'OK' để xác nhận:");
            if(confirmMsg !== 'OK') return;

            let newJsonStr = document.getElementById('db-restore').value.trim();
            try {
                let parsedDb = JSON.parse(newJsonStr);
                if(!parsedDb.users || !parsedDb.results) throw new Error("Cấu trúc JSON không hợp lệ");
                
                DATA = parsedDb; 
                await saveToGitlab("Admin Forced Restore Data"); 
                alert("Khôi phục thành công! Trang sẽ tự tải lại.");
                location.reload();
            } catch (err) {
                alert("Lỗi: JSON không hợp lệ. Vui lòng kiểm tra lại. Chi tiết: " + err.message);
            }
        }
    </script>
</body>
</html>
